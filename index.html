<!DOCTYPE html>
<html>
<head>
<title>Meri Pyaari Nitya</title>

<style>
body{
  margin:0;
  font-family: Arial;
  text-align:center;
  background:#ffe4ec;
  overflow:hidden;
}

h1{
  font-size:50px;
  color:#ff4d88;
  margin-top:120px;
}

p{
  font-size:20px;
  padding:20px;
}

button{
  padding:15px 30px;
  font-size:20px;
  background:#ff66a3;
  color:white;
  border:none;
  border-radius:20px;
}

.heart{
  position:absolute;
  color:#ff99cc;
  animation: float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<h1>MERI PYAARI NITYA 💗</h1>

<p>
lagta aagyi hai ghar wapis welcome home 😁😁<br>
abhi toh guarantee bhi nhi hai gyi bhi thi ya nhi 🤭🤭<br>
chalo chaloo itna toh pta chal gya ki par toh rhi hai aaram se paro 🤭🤭
</p>

<a href="page2.html">
<button>Enter My Heart 💖</button>
</a>

<script>
for(let i=0;i<30;i++){
  let heart=document.createElement("div");
  heart.innerHTML="💗";
  heart.className="heart";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  heart.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(heart);
}
</script>

</body>
</html>
